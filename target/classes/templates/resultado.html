<!DOCTYPE html>
<html lang="es"
xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Resultado</title>

<style>

body{

font-family:Arial;

background:#f4f4f4;

}

.contenedor{

width:600px;

margin:50px auto;

background:white;

padding:30px;

border-radius:10px;

box-shadow:0px 0px 10px gray;

}

h1{

text-align:center;

color:#1d3557;

}

.dato{

font-size:20px;

margin:15px;

}

a{

display:block;

text-align:center;

margin-top:25px;

text-decoration:none;

background:#1d3557;

color:white;

padding:10px;

border-radius:5px;

}

a:hover{

background:#457b9d;

}

</style>

</head>

<body>

<div class="contenedor">

<h1>Resultado del Algoritmo</h1>

<p class="dato">

<b>Nodo Inicial:</b>

<span th:text="${inicio}"></span>

</p>

<p class="dato">

<b>Nodo Destino:</b>

<span th:text="${fin}"></span>

</p>

<p class="dato">

<b>Camino más corto:</b>

<span th:text="${camino}"></span>

</p>

<p class="dato">

<b>Distancia Total:</b>

<span th:text="${distancia}"></span>

</p>

<a th:href="@{/}">

Volver

</a>

</div>

</body>

</html>
