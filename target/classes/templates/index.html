<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Algoritmo de Dijkstra</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

.modal-backdrop {
    position: fixed;
    width: 250px;
    height: 200px;
    bottom: 15px;
    right: 0;
    margin: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal-card {
    background: rgb(255, 255, 255);
   
    border-radius: 7px;
    padding: 24px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.modal-card h3 {
    margin-bottom: 12px;
    color: #1d3557;
}

.modal-card p {
    margin: 8px 0;
}

.modal-card button {
    margin-top: 16px;
}

body{
    background:#e9ecef;
    height:100vh;
}

.contenedor{
    display:flex;
    height:100vh;
}

/* Panel izquierdo */

.sidebar{
    width:320px;
    background:#1d3557;
    color:white;
    padding:25px;
    overflow:auto;
}

.sidebar h2{
    margin-bottom:20px;
    text-align:center;
}

.card{
    background:white;
    color:black;
    border-radius:8px;
    padding:18px;
    margin-bottom:25px;
}

.card h3{
    margin-bottom:15px;
    color:#1d3557;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#1d3557;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#457b9d;
}

/* Área del grafo */

.grafo{
    flex:1;
    background:white;
    position:relative;
}

canvas{
    width:100%;
    height:100%;
    display:block;
}

</style>

</head>
<body>

<div class="contenedor">

    <!-- Panel izquierdo -->
    <div class="sidebar">

        <h2>Algoritmo de Dijkstra</h2>

        <!-- Agregar nodo -->
        <div class="card">

            

            <form th:action="@{/agregar-nodo}" method="post">
                <label>Nombre del nodo</label>
                <input type="text" name="nombre" placeholder="Ejemplo: A" >

                <button type="submit">
                    Agregar Nodo
                </button>

            </form>

        </div>

        <div class="card" style="display: none;">
            <h3>Renombrar nodo</h3>
            <p style="margin-bottom: 10px; color: #555;">Haz clic en un nodo del grafo para seleccionarlo y cambiar su nombre.</p>
            <form th:action="@{/renombrar-nodo}" method="post">
                <label>Nombre actual</label>
                <input type="text" id="nombreActual" name="nombreActual" placeholder="Ejemplo: A" required>
                <label>Nuevo nombre</label>
                <input type="text" id="nuevoNombre" name="nuevoNombre" placeholder="Ejemplo: Z" required>
                <button type="submit">Renombrar</button>
            </form>
        </div>

        <!-- Agregar conexión -->
        <div class="card">

            <h3>Agregar Conexión</h3>

            <form th:action="@{/agregar-arista}" method="post">

                <label>Nodo Origen</label>
                <select name="origen" required>
                    <option value="">Selecciona un nodo</option>
                    <option th:each="nodo : ${nodos}" th:value="${nodo}" th:text="${nodo}"></option>
                </select>

                <label>Nodo Destino</label>
                <select name="destino" required>
                    <option value="">Selecciona un nodo</option>
                    <option th:each="nodo : ${nodos}" th:value="${nodo}" th:text="${nodo}"></option>
                </select>

                <label>Peso</label>
                <input type="number" name="peso" min="1" placeholder="Ejemplo: 5" required>

                <button type="submit">
                    Agregar Conexión
                </button>

            </form>

        </div>

        <!-- Calcular camino -->
        <div class="card">

            <h3>Calcular Camino</h3>

            <form th:action="@{/calcular}" method="post">

                <label>Nodo Inicial</label>
                <select name="inicio" required>
                    <option value="">Selecciona un nodo</option>
                    <option th:each="nodo : ${nodos}" th:value="${nodo}" th:text="${nodo}"></option>
                </select>

                <label>Nodo Destino</label>
                <select name="fin" required>
                    <option value="">Selecciona un nodo</option>
                    <option th:each="nodo : ${nodos}" th:value="${nodo}" th:text="${nodo}"></option>
                </select>

                <button type="submit">
                    Calcular Camino
                </button>

            </form>

        </div>

    </div>

    <!-- Área de dibujo -->
    <div class="grafo">
        <div id="nodeMenu" style="display:none; position:absolute; z-index:20; background:white; border:1px solid #ccc; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.15); padding:8px; min-width:140px;">
            <button type="button" data-action="delete" style="margin-bottom:6px;">Eliminar nodo</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>

</div>

<div th:if="${mensaje}" style="position:fixed; bottom:20px; right:20px; background:#1d3557; color:white; padding:12px 16px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.2);">
    <span th:text="${mensaje}"></span>
</div>

<div th:if="${mostrarModalResultado}" class="modal-backdrop">
    <div class="modal-card">
        <h3>Resultado del camino</h3>
        <p><strong>Inicio:</strong> <span th:text="${inicio}"></span></p>
        <p><strong>Destino:</strong> <span th:text="${fin}"></span></p>
        <p><strong>Camino:</strong> <span th:text="${camino}"></span></p>
        <p><strong>Distancia:</strong> <span th:text="${distancia}"></span></p>
        <form th:action="@{/}" method="get">
            <button type="submit">Cerrar</button>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const nodos = /*[[${nodos}]]*/ [];
    const aristas = /*[[${aristas}]]*/ [];
    const STORAGE_KEY = 'dijkstra-node-positions';
    const posicionesPorDefecto = {
        A: { x: 140, y: 90 },
        B: { x: 380, y: 180 },
        C: { x: 250, y: 250 },
        D: { x: 520, y: 250 },
        E: { x: 380, y: 360 },
        F: { x: 620, y: 360 }
    };
    const radioNodo = 24;
    let nodoArrastrado = null;
    let nodoSeleccionado = null;
    let posiciones = {};
    let menuNodoActual = null;

    function cargarPosiciones() {
        try {
            const guardadas = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            return guardadas;
        } catch (error) {
            return {};
        }
    }

    function guardarPosiciones() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(posiciones));
    }

    posiciones = cargarPosiciones();

    function obtenerPosicion(nombre) {
        if (!posiciones[nombre]) {
            const base = posicionesPorDefecto[nombre] || (() => {
                const indice = nodos.indexOf(nombre);
                const columnas = 3;
                const fila = Math.floor(indice / columnas);
                const columna = indice % columnas;
                return {
                    x: 140 + columna * 180,
                    y: 90 + fila * 140
                };
            })();
            posiciones[nombre] = { ...base };
            guardarPosiciones();
        }
        return posiciones[nombre];
    }

    function dibujarGrafo() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#457b9d';
        ctx.lineWidth = 2;
        aristas.forEach(arista => {
            const origen = obtenerPosicion(arista.origen);
            const destino = obtenerPosicion(arista.destino);
            ctx.beginPath();
            ctx.moveTo(origen.x, origen.y);
            ctx.lineTo(destino.x, destino.y);
            ctx.stroke();

            const mx = (origen.x + destino.x) / 2;
            const my = (origen.y + destino.y) / 2;
            ctx.fillStyle = '#1d3557';
            ctx.font = '12px Arial';
            ctx.fillText(arista.peso, mx + 8, my - 8);
        });

        nodos.forEach(nombre => {
            const pos = obtenerPosicion(nombre);
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, radioNodo, 0, Math.PI * 2);
            ctx.fillStyle = '#1d3557';
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(nombre, pos.x, pos.y);
        });
    }

    function obtenerNodoEnCoordenadas(x, y) {
        for (let i = nodos.length - 1; i >= 0; i--) {
            const nombre = nodos[i];
            const pos = obtenerPosicion(nombre);
            const distancia = Math.hypot(x - pos.x, y - pos.y);
            if (distancia <= radioNodo + 4) {
                return nombre;
            }
        }
        return null;
    }

    function mostrarMenuNodo(nombre, x, y) {
        const menu = document.getElementById('nodeMenu');
        menuNodoActual = nombre;
        menu.style.display = 'block';
        menu.style.left = `${x + 10}px`;
        menu.style.top = `${y + 10}px`;
    }

    function ocultarMenuNodo() {
        document.getElementById('nodeMenu').style.display = 'none';
        menuNodoActual = null;
    }

    function manejarAccionMenu(action) {
        if (!menuNodoActual) return;
        if (action === 'delete') {
            const form = document.createElement('form');
            form.method = 'post';
            form.action = '/eliminar-nodo';
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'nombre';
            input.value = menuNodoActual;
            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        }
        ocultarMenuNodo();
    }

    document.querySelectorAll('#nodeMenu button[data-action]').forEach(boton => {
        boton.addEventListener('click', () => manejarAccionMenu(boton.getAttribute('data-action')));
    });

    function manejarMouseDown(evento) {
        const rect = evento.currentTarget.getBoundingClientRect();
        const x = evento.clientX - rect.left;
        const y = evento.clientY - rect.top;
        const nodo = obtenerNodoEnCoordenadas(x, y);
        if (nodo) {
            nodoSeleccionado = nodo;
            nodoArrastrado = nodo;
            evento.currentTarget.style.cursor = 'grabbing';
            mostrarMenuNodo(nodo, x, y);
        } else {
            ocultarMenuNodo();
        }
    }

    function manejarMouseMove(evento) {
        if (!nodoArrastrado) return;
        const rect = evento.currentTarget.getBoundingClientRect();
        const x = evento.clientX - rect.left;
        const y = evento.clientY - rect.top;
        const pos = obtenerPosicion(nodoArrastrado);
        pos.x = x;
        pos.y = y;
        dibujarGrafo();
    }

    function manejarMouseUp() {
        if (nodoArrastrado) {
            guardarPosiciones();
            nodoArrastrado = null;
            document.getElementById('canvas').style.cursor = 'grab';
        }
    }

    const canvas = document.getElementById('canvas');
    canvas.addEventListener('mousedown', manejarMouseDown);
    canvas.addEventListener('mousemove', manejarMouseMove);
    canvas.addEventListener('mouseup', manejarMouseUp);
    canvas.addEventListener('mouseleave', manejarMouseUp);
    canvas.style.cursor = 'grab';

    document.addEventListener('mousedown', (evento) => {
        const dentroMenu = evento.target.closest('#nodeMenu');
        const dentroGrafo = evento.target.closest('.grafo');
        if (!dentroMenu && !dentroGrafo) {
            ocultarMenuNodo();
        }
    });

    window.addEventListener('resize', dibujarGrafo);
    window.addEventListener('load', dibujarGrafo);
</script>
</body>
</html>
